<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perchun Hisab</title>
    
    <!-- PWA Integration -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#047857">
    <link rel="apple-touch-icon" href="./icon-192x192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(32px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        
        /* App-like behaviors */
        html, body {
            overscroll-behavior-y: none; /* Disables pull-to-refresh */
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+/Edge */
            user-select: none; /* Standard */
            -webkit-tap-highlight-color: transparent;
        }

        /* Re-enable text selection for input fields */
        input, textarea {
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }

        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideInUp 0.3s ease-out forwards; }
        .animate-slide-right { animation: slideInRight 0.3s ease-out forwards; }
        .animate-toast { animation: slideDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .hidden-view { display: none !important; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center h-screen h-[100dvh] overflow-hidden text-slate-800 font-sans">

    <div class="w-full max-w-md mx-auto h-full flex flex-col bg-slate-50 relative shadow-2xl sm:border-x sm:border-slate-200">
        
        <!-- App Header -->
        <header class="bg-emerald-700 text-white p-5 flex items-center justify-between shadow-md z-10 shrink-0">
            <div class="flex items-center">
                <div class="bg-white p-1.5 rounded-lg mr-3 shadow-sm text-emerald-700 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight leading-none">Perchun App</h1>
                    <span class="text-xs font-medium text-emerald-200">Wheat Hisab Calculator</span>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto relative bg-slate-50 pb-4">
            
            <!-- VIEW: FORM -->
            <div id="view-form" class="p-4 space-y-4 animate-slide-up">
                <!-- Input Section -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Customer Name</label>
                        <input id="in-customerName" type="text" class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="Enter customer name">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Weight (kg)</label>
                            <input id="in-grossWeight" type="number" step="any" inputmode="decimal" class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-semibold" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Rate / Mun</label>
                            <input id="in-pricePerMun" type="number" step="any" inputmode="decimal" class="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-semibold" placeholder="0">
                        </div>
                    </div>
                </div>

                <!-- Auto-Calculation Section -->
                <div class="bg-emerald-50 rounded-2xl p-5 border border-emerald-200 shadow-sm">
                    <h3 class="font-bold text-emerald-800 mb-4 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
                        Live Hisab
                    </h3>

                    <div class="space-y-3">
                        <!-- Kaat -->
                        <div class="flex items-center justify-between bg-white p-3 rounded-xl border border-emerald-100 shadow-sm">
                            <label class="text-sm font-semibold text-slate-600">Kaat (kg)</label>
                            <div class="flex items-center space-x-2">
                                <button id="btn-auto-kaat" class="hidden text-xs text-emerald-700 bg-emerald-100 px-2 py-1.5 rounded-lg flex items-center hover:bg-emerald-200 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                    Auto
                                </button>
                                <input id="in-kaat" type="number" step="any" inputmode="decimal" class="w-24 text-right bg-slate-50 border border-slate-200 rounded-lg px-2 py-1 focus:ring-2 focus:ring-emerald-400 outline-none font-bold text-slate-800" placeholder="0">
                            </div>
                        </div>

                        <!-- Safi & Muns Readonly Display -->
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-white p-3 rounded-xl border border-emerald-100 shadow-sm">
                                <span class="block text-xs font-semibold text-slate-500 mb-1">Safi Weight</span>
                                <span class="font-black text-slate-800 text-lg"><span id="out-safi">0.0</span> <span class="text-xs font-medium text-slate-500">kg</span></span>
                            </div>
                            <div class="bg-white p-3 rounded-xl border border-emerald-100 shadow-sm">
                                <span class="block text-xs font-semibold text-slate-500 mb-1">In Muns (40kg)</span>
                                <span class="font-black text-slate-800 text-lg" id="out-muns">0.000</span>
                            </div>
                        </div>

                        <!-- Total Price -->
                        <div class="flex items-center justify-between bg-white p-4 rounded-xl border-2 border-emerald-300 shadow-md mt-4">
                            <label class="text-sm font-black text-emerald-900">Total (Rs)</label>
                            <div class="flex items-center space-x-2">
                                <button id="btn-auto-price" class="hidden text-xs text-emerald-700 bg-emerald-100 px-2 py-1.5 rounded-lg flex items-center hover:bg-emerald-200 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                    Auto
                                </button>
                                <input id="in-totalPrice" type="number" step="any" inputmode="decimal" class="w-32 text-right bg-emerald-50 border-b-2 border-emerald-500 px-2 py-1 focus:bg-white outline-none font-black text-xl text-emerald-700 rounded-t-md" placeholder="0">
                            </div>
                        </div>
                    </div>
                </div>

                <button id="btn-save" class="w-full bg-emerald-600 text-white rounded-2xl py-4 font-bold text-lg flex items-center justify-center shadow-lg shadow-emerald-200 active:bg-emerald-700 hover:bg-emerald-700 transition-colors mt-2">
                    Save to Register & View Receipt
                </button>
            </div>

            <!-- VIEW: RECEIPT -->
            <div id="view-receipt" class="p-4 flex-1 animate-slide-right hidden-view">
                <button id="btn-back-from-receipt" class="mb-4 flex items-center text-emerald-700 font-bold bg-emerald-50 px-3 py-2 rounded-xl active:bg-emerald-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="m15 18-6-6 6-6"/></svg>
                    Back to Calculator
                </button>

                <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-3 bg-emerald-500"></div>
                    
                    <div class="text-center mb-6 mt-3 border-b border-dashed border-slate-300 pb-4">
                        <h2 class="text-3xl font-black text-slate-800 tracking-tight">Perchun Hisab</h2>
                        <p id="receipt-date" class="text-sm text-slate-500 font-medium mt-1"></p>
                    </div>

                    <div class="space-y-4 text-slate-700 font-medium">
                        <div class="flex justify-between items-end pb-2">
                            <span class="text-slate-500 text-sm">Customer</span>
                            <span id="receipt-name" class="font-bold text-slate-800 text-lg"></span>
                        </div>
                        <div class="flex justify-between items-end pb-2">
                            <span class="text-slate-500 text-sm">Gross Weight</span>
                            <span class="font-bold text-slate-800"><span id="receipt-gross"></span> kg</span>
                        </div>
                        <div class="flex justify-between items-end pb-2 text-red-600 bg-red-50 px-2 rounded-md py-1 -mx-2">
                            <span class="text-sm">Kaat (Deduction)</span>
                            <span class="font-bold">- <span id="receipt-kaat"></span> kg</span>
                        </div>
                        <div class="flex justify-between items-end pb-2 bg-emerald-50 px-2 rounded-md py-1 -mx-2">
                            <span class="text-emerald-700 text-sm">Safi Weight</span>
                            <span class="font-black text-emerald-800"><span id="receipt-safi"></span> kg</span>
                        </div>
                        <div class="flex justify-between items-end pb-2">
                            <span class="text-slate-500 text-sm">Muns (40kg)</span>
                            <span id="receipt-muns" class="font-bold text-slate-800"></span>
                        </div>
                        <div class="flex justify-between items-end pb-2">
                            <span class="text-slate-500 text-sm">Rate / Mun</span>
                            <span class="font-bold text-slate-800">Rs <span id="receipt-rate"></span></span>
                        </div>
                        
                        <div class="flex justify-between items-center pt-6 mt-2 border-t-2 border-slate-800">
                            <span class="text-lg font-black text-slate-800 uppercase">Total Amount</span>
                            <span class="text-3xl font-black text-emerald-600">Rs <span id="receipt-total"></span></span>
                        </div>
                    </div>
                </div>

                <div class="flex space-x-3 mt-6">
                    <button id="btn-edit-receipt" class="flex-1 bg-blue-50 text-blue-700 border border-blue-200 rounded-2xl py-3 font-bold flex items-center justify-center active:bg-blue-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                        Edit
                    </button>
                    <button id="btn-delete-receipt" class="flex-1 bg-red-50 text-red-700 border border-red-200 rounded-2xl py-3 font-bold flex items-center justify-center active:bg-red-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        Delete
                    </button>
                </div>

                <button id="btn-copy-receipt" class="w-full mt-3 bg-slate-800 text-white rounded-2xl py-4 font-bold text-lg flex items-center justify-center shadow-lg active:bg-slate-900 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    Copy Receipt for WhatsApp
                </button>
            </div>

            <!-- VIEW: HISTORY -->
            <div id="view-history" class="p-4 space-y-3 animate-fade-in hidden-view">
                <h2 class="text-2xl font-black text-slate-800 mb-4 px-1 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2 text-emerald-600"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                    Hisab Register
                </h2>
                
                <div id="history-container" class="space-y-3">
                    <!-- History items injected via JS -->
                </div>
                
                <div id="empty-history" class="text-center text-slate-500 py-12 bg-white rounded-2xl border border-slate-200 border-dashed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-3 text-emerald-200"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                    <p class="font-medium">No records saved yet.</p>
                    <p class="text-sm mt-1">Calculations you save will appear here.</p>
                </div>
            </div>

        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="w-full bg-white border-t border-slate-200 flex justify-around p-2 pb-6 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-20 shrink-0 mt-auto">
            <button id="nav-btn-form" class="flex flex-col items-center p-2 px-6 rounded-xl transition-colors text-emerald-700 bg-emerald-50 active:bg-emerald-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
                <span class="text-xs font-bold">New Hisab</span>
            </button>
            
            <button id="nav-btn-history" class="flex flex-col items-center p-2 px-6 rounded-xl transition-colors text-slate-500 active:bg-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                <span class="text-xs font-bold">Register</span>
            </button>
        </nav>

        <!-- Toast Container -->
        <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-2xl z-50 text-sm font-bold items-center w-[90%] max-w-sm hidden">
            <div id="toast-msg" class="flex-1 text-center"></div>
        </div>

    </div>

    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW init failed:', err));
            });
        }

        // --- State Management ---
        const STORAGE_KEY = 'perchun_app_records';
        let currentView = 'form';
        let isKaatManual = false;
        let isPriceManual = false;
        let records = [];
        let currentRecord = null;
        let editingRecordId = null;

        // --- DOM Elements ---
        const views = {
            form: document.getElementById('view-form'),
            receipt: document.getElementById('view-receipt'),
            history: document.getElementById('view-history')
        };
        const nav = {
            container: document.getElementById('bottom-nav'),
            formBtn: document.getElementById('nav-btn-form'),
            historyBtn: document.getElementById('nav-btn-history')
        };
        const inputs = {
            customerName: document.getElementById('in-customerName'),
            grossWeight: document.getElementById('in-grossWeight'),
            pricePerMun: document.getElementById('in-pricePerMun'),
            kaat: document.getElementById('in-kaat'),
            totalPrice: document.getElementById('in-totalPrice')
        };
        const outputs = {
            safi: document.getElementById('out-safi'),
            muns: document.getElementById('out-muns')
        };
        const buttons = {
            autoKaat: document.getElementById('btn-auto-kaat'),
            autoPrice: document.getElementById('btn-auto-price'),
            save: document.getElementById('btn-save'),
            back: document.getElementById('btn-back-from-receipt'),
            copy: document.getElementById('btn-copy-receipt'),
            edit: document.getElementById('btn-edit-receipt'),
            delete: document.getElementById('btn-delete-receipt')
        };

        // --- Init Function ---
        function init() {
            attachEventListeners();
            loadRecords();
        }

        // --- Local Storage Management ---
        function loadRecords() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    records = JSON.parse(stored);
                }
            } catch (e) {
                console.error("Failed to load records from LocalStorage", e);
                records = [];
            }
            renderHistory();
        }

        function saveRecords() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            } catch (e) {
                console.error("Failed to save records to LocalStorage", e);
                showToast("❌ Storage error.");
            }
        }

        // --- Core Logic & Calculations ---
        function formatMuns(totalKg) {
            const m = Math.floor(totalKg / 40);
            const kg = parseFloat((totalKg % 40).toFixed(2));
            let parts = [];
            if (m > 0) parts.push(`${m} Mun`);
            if (kg > 0 || m === 0) parts.push(`${kg} kg`);
            return parts.join(' ');
        }

        function calculate() {
            const gw = parseFloat(inputs.grossWeight.value) || 0;
            const pm = parseFloat(inputs.pricePerMun.value) || 0;

            let finalKaat;
            if (isKaatManual) {
                finalKaat = parseFloat(inputs.kaat.value) || 0;
                buttons.autoKaat.classList.remove('hidden');
            } else {
                finalKaat = Math.round(gw / 20) * 0.5;
                inputs.kaat.value = finalKaat || ''; 
                buttons.autoKaat.classList.add('hidden');
            }

            const safiWeight = Math.max(0, gw - finalKaat);
            const muns = safiWeight / 40;

            outputs.safi.textContent = safiWeight.toFixed(1);
            outputs.muns.textContent = formatMuns(safiWeight);

            let finalTotal;
            if (isPriceManual) {
                finalTotal = parseFloat(inputs.totalPrice.value) || 0;
                buttons.autoPrice.classList.remove('hidden');
            } else {
                finalTotal = muns * pm;
                inputs.totalPrice.value = Math.round(finalTotal) || '';
                buttons.autoPrice.classList.add('hidden');
            }
        }

        // --- Event Listeners ---
        function attachEventListeners() {
            inputs.grossWeight.addEventListener('input', calculate);
            inputs.pricePerMun.addEventListener('input', calculate);

            inputs.kaat.addEventListener('input', () => {
                isKaatManual = true;
                calculate();
            });
            inputs.totalPrice.addEventListener('input', () => {
                isPriceManual = true;
                calculate();
            });

            buttons.autoKaat.addEventListener('click', () => {
                isKaatManual = false;
                calculate();
            });
            buttons.autoPrice.addEventListener('click', () => {
                isPriceManual = false;
                calculate();
            });

            buttons.save.addEventListener('click', handleSave);
            buttons.back.addEventListener('click', () => switchView('form'));
            buttons.copy.addEventListener('click', copyReceipt);
            buttons.edit.addEventListener('click', handleEdit);
            buttons.delete.addEventListener('click', handleDelete);
            nav.formBtn.addEventListener('click', () => switchView('form'));
            nav.historyBtn.addEventListener('click', () => switchView('history'));
        }

        // --- Actions ---
        function handleSave() {
            const gw = parseFloat(inputs.grossWeight.value);
            const pm = parseFloat(inputs.pricePerMun.value);

            if (!gw || !pm) {
                showToast("⚠️ Please enter weight and rate first.");
                return;
            }

            const finalKaat = isKaatManual ? (parseFloat(inputs.kaat.value) || 0) : (Math.round(gw / 20) * 0.5);
            const safi = Math.max(0, gw - finalKaat);
            const muns = safi / 40;
            const finalTotal = isPriceManual ? (parseFloat(inputs.totalPrice.value) || 0) : (muns * pm);

            const record = {
                customerName: inputs.customerName.value.trim() || 'Walk-in Customer',
                grossWeight: gw,
                pricePerMun: pm,
                kaat: finalKaat,
                safiWeight: safi,
                muns: muns,
                totalPrice: finalTotal,
                date: new Date().toISOString()
            };

            if (editingRecordId) {
                const idx = records.findIndex(r => r.id === editingRecordId);
                if(idx !== -1) records[idx] = { id: editingRecordId, ...record };
                showToast("✅ Hisab updated!");
            } else {
                records.unshift({ id: Date.now().toString(), ...record });
                showToast("✅ Hisab saved!");
            }
            
            saveRecords();
            renderHistory();

            editingRecordId = null;
            currentRecord = record;
            populateReceipt(record);
            switchView('receipt');
            resetForm();
        }

        function resetForm() {
            inputs.customerName.value = '';
            inputs.grossWeight.value = '';
            inputs.pricePerMun.value = '';
            inputs.kaat.value = '';
            inputs.totalPrice.value = '';
            isKaatManual = false;
            isPriceManual = false;
            calculate();
        }

        function copyReceipt() {
            if (!currentRecord) return;
            const text = `🌾 *Perchun Hisab* 🌾\n\n` +
                `👤 Name: ${currentRecord.customerName}\n` +
                `⚖️ Gross Wt: ${Number(currentRecord.grossWeight).toFixed(1)} kg\n` +
                `✂️ Kaat: ${Number(currentRecord.kaat).toFixed(1)} kg\n` +
                `✅ Safi Wt: ${Number(currentRecord.safiWeight).toFixed(1)} kg (${formatMuns(currentRecord.safiWeight)})\n` +
                `💰 Rate: Rs ${currentRecord.pricePerMun} / Mun\n` +
                `🧾 *Total Amount: Rs ${Math.round(currentRecord.totalPrice).toLocaleString()}*\n\n` +
                `📅 ${new Date(currentRecord.date).toLocaleString('en-PK')}`;

            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("📋 Receipt copied! You can now paste it in WhatsApp.");
            } catch (err) {
                showToast("❌ Failed to copy receipt.");
            }
            document.body.removeChild(textArea);
        }

        function handleEdit() {
            if (!currentRecord) return;
            inputs.customerName.value = currentRecord.customerName;
            inputs.grossWeight.value = currentRecord.grossWeight;
            inputs.pricePerMun.value = currentRecord.pricePerMun;
            inputs.kaat.value = currentRecord.kaat;
            inputs.totalPrice.value = Math.round(currentRecord.totalPrice);
            
            isKaatManual = true; 
            isPriceManual = true; 
            editingRecordId = currentRecord.id;
            
            calculate();
            switchView('form');
        }

        let deleteConfirm = false;
        function handleDelete() {
            if (!currentRecord) return;
            
            if (!deleteConfirm) {
                const originalHtml = buttons.delete.innerHTML;
                buttons.delete.innerHTML = `Confirm Delete?`;
                buttons.delete.classList.replace('bg-red-50', 'bg-red-600');
                buttons.delete.classList.replace('text-red-700', 'text-white');
                deleteConfirm = true;
                
                setTimeout(() => {
                    deleteConfirm = false;
                    buttons.delete.innerHTML = originalHtml;
                    buttons.delete.classList.replace('bg-red-600', 'bg-red-50');
                    buttons.delete.classList.replace('text-white', 'text-red-700');
                }, 3000);
                return;
            }
            
            records = records.filter(r => r.id !== currentRecord.id);
            saveRecords();
            renderHistory();
            
            deleteConfirm = false;
            showToast("🗑️ Record deleted");
            switchView('history');
            
            buttons.delete.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg> Delete`;
            buttons.delete.classList.replace('bg-red-600', 'bg-red-50');
            buttons.delete.classList.replace('text-white', 'text-red-700');
        }

        // --- UI Updates ---
        function switchView(viewName) {
            currentView = viewName;
            
            Object.values(views).forEach(v => v.classList.add('hidden-view'));
            views[viewName].classList.remove('hidden-view');

            if (viewName === 'receipt') {
                nav.container.style.display = 'none';
            } else {
                nav.container.style.display = 'flex';
                const isForm = viewName === 'form';
                
                nav.formBtn.className = `flex flex-col items-center p-2 px-6 rounded-xl transition-colors ${isForm ? 'text-emerald-700 bg-emerald-50' : 'text-slate-500'}`;
                nav.historyBtn.className = `flex flex-col items-center p-2 px-6 rounded-xl transition-colors ${!isForm ? 'text-emerald-700 bg-emerald-50' : 'text-slate-500'}`;
            }
        }

        function populateReceipt(record) {
            document.getElementById('receipt-date').textContent = new Date(record.date).toLocaleString('en-PK');
            document.getElementById('receipt-name').textContent = record.customerName;
            document.getElementById('receipt-gross').textContent = Number(record.grossWeight).toFixed(1);
            document.getElementById('receipt-kaat').textContent = Number(record.kaat).toFixed(1);
            document.getElementById('receipt-safi').textContent = Number(record.safiWeight).toFixed(1);
            document.getElementById('receipt-muns').textContent = formatMuns(record.safiWeight);
            document.getElementById('receipt-rate').textContent = record.pricePerMun;
            document.getElementById('receipt-total').textContent = Math.round(record.totalPrice).toLocaleString();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            const emptyState = document.getElementById('empty-history');
            
            container.innerHTML = '';
            
            if (records.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            records.forEach(rec => {
                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-200 active:bg-emerald-50 transition-all flex justify-between items-center cursor-pointer";
                item.innerHTML = `
                    <div>
                        <h4 class="font-bold text-slate-800 text-lg leading-tight">${rec.customerName}</h4>
                        <p class="text-xs font-medium text-slate-500 mt-1">
                            ${new Date(rec.date).toLocaleDateString('en-PK')} <span class="mx-1">•</span> <span class="text-emerald-700">${Number(rec.safiWeight).toFixed(1)} kg</span>
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-emerald-600 text-lg">Rs ${Math.round(rec.totalPrice).toLocaleString()}</p>
                    </div>
                `;
                item.addEventListener('click', () => {
                    currentRecord = rec;
                    populateReceipt(rec);
                    switchView('receipt');
                });
                container.appendChild(item);
            });
        }

        let toastTimeout;
        function showToast(msg) {
            const t = document.getElementById('toast-container');
            document.getElementById('toast-msg').textContent = msg;
            t.classList.remove('hidden');
            t.classList.add('flex', 'animate-toast');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                t.classList.add('hidden');
                t.classList.remove('flex', 'animate-toast');
            }, 3000);
        }

        init();
    </script>
</body>
</html>
